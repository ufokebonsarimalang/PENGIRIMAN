<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pengiriman</title>

<style>

body{
  margin:0;
  padding:15px;
  background:#f5f7fa;
  font-family:Arial,sans-serif;
}

.header{
  background:#1565c0;
  color:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.jumlah{
  text-align:center;
  margin-bottom:15px;
  font-size:18px;
  font-weight:bold;
}

.card{
  background:white;
  border-radius:15px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
  white-space:pre-wrap;
  line-height:1.6;
  font-size:16px;
}

.tanggal{
  color:#1565c0;
  font-weight:bold;
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:8px;
}

</style>
</head>

<body>

<div class="header">
🚚 CEK PENGIRIMAN 
</div>

<div class="jumlah" id="jumlah">
Memuat data...
</div>

<div id="list"></div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbykT2QFJ_BtyUaXbMAlCwPqdQFiS09U3gVUQXRZR4ufbyf8hpj6oZcQ5jTiLthzFBjt/exec";

fetch(API_URL)
.then(r => r.json())
.then(data => {

  let html = "";
  let total = 0;

  data.forEach(row => {

    if(row[0]){

      total++;

      html += `
      <div class="card">

      <div class="tanggal">
      📅 ${row[1]}
      </div>

      ${row[0]}

      </div>
      `;
    }

  });

  document.getElementById("jumlah").innerHTML =
    "Total Pengiriman : " + total;

  document.getElementById("list").innerHTML =
    html;

})
.catch(err => {

  document.getElementById("jumlah").innerHTML =
    "❌ Gagal mengambil data";

  console.log(err);

});

</script>

</body>
</html>
