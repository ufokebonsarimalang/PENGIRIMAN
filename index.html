<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CEK PENGIRIMAN</title>

<style>
body{
margin:0;
padding:10px;
font-family:Arial;
background:#f1f5f9;
}

/* LOGIN CARD */
.login-box{
max-width:320px;
margin:40px auto;
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

button{
width:100%;
margin-top:15px;
padding:10px;
background:#1565c0;
color:#fff;
border:none;
border-radius:10px;
font-weight:bold;
}

/* INFO LOGIN */
#loginInfo{
text-align:center;
margin:10px 0;
font-size:13px;
font-weight:600;
color:#333;
}

/* LIST */
.card{
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.06);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

<h3 style="text-align:center;color:#1565c0">🚚 LOGIN DRIVER</h3>

<input id="user" type="text" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div id="msg" style="text-align:center;margin-top:10px;font-size:13px"></div>

</div>

<!-- INFO LOGIN -->
<div id="loginInfo"></div>

<!-- LIST -->
<div id="list"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyt7ESUBCLIcNfzCuOZAThCyIesFFlO0nHn4jgzDYoTit6byLEksINbdUc3J0XDa-gZ/exec";

/* =====================
LOGIN
===================== */
function login(){

const user = document.getElementById("user").value;
const pass = document.getElementById("pass").value;

fetch(API_URL + "?action=login&user=" + user + "&pass=" + pass)
.then(r=>r.json())
.then(res=>{

if(res.status === "OK"){

const loginData = {
user: res.user,
time: new Date().toLocaleString()
};

localStorage.setItem("driver", JSON.stringify(loginData));

document.getElementById("msg").innerHTML =
"✔ Login berhasil";

setTimeout(()=>{
location.reload();
},800);

}else{
document.getElementById("msg").innerHTML =
"❌ Login gagal";
}

});

}

/* =====================
SHOW LOGIN INFO
===================== */
function showLogin(){

const data = localStorage.getItem("driver");

if(!data){
document.getElementById("loginInfo").innerHTML =
"❌ Belum login";
return;
}

const obj = JSON.parse(data);

document.getElementById("loginInfo").innerHTML =
"👤 " + obj.user + " | 🕒 " + obj.time;

document.getElementById("loginBox").style.display = "none";

}

showLogin();

</script>

</body>
</html>
