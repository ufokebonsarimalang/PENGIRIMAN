<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pengiriman</title>

<style>

body{
  margin:0;
  padding:12px;
  background:#f5f7fa;
  font-family:Arial,sans-serif;
}

/* HEADER */
.header{
  background:#1565c0;
  color:white;
  padding:18px;
  border-radius:15px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-bottom:15px;
}

/* INFO */
.jumlah{
  text-align:center;
  margin-bottom:15px;
}

.tanggal-besar{
  font-size:22px;
  font-weight:bold;
  color:#1565c0;
}

.total{
  margin-top:5px;
  font-size:16px;
  font-weight:bold;
}

/* CARD (SUDAH RAPI) */
.card{
  background:white;
  border-radius:12px;
  padding:12px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  white-space:pre-wrap;
  line-height:1.4;
  font-size:15px;
}

/* LOGIN */
#loginBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f5f7fa;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.login-card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,.2);
  text-align:center;
}

.login-card input{
  padding:10px;
  width:200px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

.login-card button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  background:#1565c0;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* BUTTON */
.btn-wrap{
  margin-top:8px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.proses{background:#f39c12;color:white;}
.selesai{background:#2ecc71;color:white;}
.retur{background:#e74c3c;color:white;}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2>Login PIN</h2>
    <input type="password" id="pin" placeholder="Masukkan PIN">
    <br>
    <button onclick="login()">Masuk</button>
    <p id="msg" style="color:red;"></p>
  </div>
</div>

<!-- 📦 CONTENT -->
<div id="content" style="display:none;">

<div class="header">
  <img src="logo.png"
       style="width:110px;height:110px;border-radius:50%;border:3px solid #fff;object-fit:cover;">
  <h2 style="margin-top:10px;">CEK PENGIRIMAN</h2>
</div>

<div id="jumlah" class="jumlah">Memuat data...</div>
<div id="list"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbykT2QFJ_BtyUaXbMAlCwPqdQFiS09U3gVUQXRZR4ufbyf8hpj6oZcQ5jTiLthzFBjt/exec";

let correctPIN = "";
let sheetData = [];

/* GET DATA */
fetch(API_URL)
.then(r => r.json())
.then(res => {
  correctPIN = res.pin;
  sheetData = res.data;
});

/* LOGIN */
function login(){

  const pin = document.getElementById("pin").value;

  if(pin === correctPIN){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("content").style.display = "block";
    loadData();
  } else {
    document.getElementById("msg").innerText = "PIN salah!";
  }

}

/* UPDATE STATUS */
function updateStatus(row, status){

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ row, status })
  })
  .then(r => r.text())
  .then(res => {
    loadData();
  })
  .catch(err => console.log(err));

}

/* LOAD DATA */
function loadData(){

  let html = "";
  let total = 0;
  let tanggalPengiriman = "";

  sheetData.forEach((row, index) => {

    const isi = row[0];
    const status = row[2];

    if(!isi) return;

    total++;

    let warna = "#f39c12";
    if(status === "Selesai") warna = "#2ecc71";
    else if(status === "Retur") warna = "#e74c3c";

    if(!tanggalPengiriman && row[1]){
      const tgl = new Date(row[1]);
      tanggalPengiriman =
        tgl.toLocaleDateString("id-ID",{
          day:"2-digit",
          month:"long",
          year:"numeric"
        });
    }

    html += `
    <div class="card" style="border-left:5px solid ${warna}">
      
      <div>${isi}</div>

      <div style="margin-top:6px;font-weight:bold;color:${warna}">
        Status: ${status || "Proses"}
      </div>

      <div class="btn-wrap">
        <button class="btn proses" onclick="updateStatus(${index+1}, 'Proses')">Proses</button>
        <button class="btn selesai" onclick="updateStatus(${index+1}, 'Selesai')">Selesai</button>
        <button class="btn retur" onclick="updateStatus(${index+1}, 'Retur')">Retur</button>
      </div>

    </div>
    `;
  });

  document.getElementById("jumlah").innerHTML = `
  <div class="tanggal-besar">📅 ${tanggalPengiriman}</div>
  <div class="total">Total Pengiriman: ${total}</div>
  `;

  document.getElementById("list").innerHTML = html;

}

</script>

</body>
</html>
