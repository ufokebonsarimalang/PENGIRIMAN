<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<title>CEK PENGIRIMAN</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
margin:0;
font-family:'Inter', Arial, sans-serif;
background:#f4f6f9;
color:#111;
}

/* LOGIN */
.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
width:280px;
text-align:center;
}

.box img{
width:80px;
height:80px;
border-radius:50%;
border:2px solid #ddd;
object-fit:cover;
margin-bottom:8px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
box-sizing: border-box;
}

/* SPINNER LOADING STYLE */
.btn-isi {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.spinner {
width: 18px;
height: 18px;
border: 2px solid rgba(255,255,255,0.3);
border-radius: 50%;
border-top-color: #fff;
animation: putar 0.6s linear infinite;
display: none;
}

@keyframes putar {
to { transform: rotate(360deg); }
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1565c0;
color:#fff;
font-weight:700;
cursor:pointer;
font-size: 14px;
}

button:disabled {
background: #a1a1a1 !important;
cursor: not-allowed;
}

/* APP */
#app{
display:none;
padding:10px;
}

/* HEADER */
.header{
background:#fff;
padding:16px;
border-radius:14px;
text-align:center;
margin-bottom:10px;
border:2px solid #d4af37;
box-shadow:0 0 12px rgba(212,175,55,0.4);
}

.header-title{
font-size:22px;
font-weight:900;
color:#6d28d9;
letter-spacing:2px;
}

/* PENCARIAN */
.search-container {
margin-bottom: 10px;
}
.search-input {
width: 100%;
padding: 12px;
border-radius: 12px;
border: 2px solid #6d28d9;
font-size: 14px;
font-weight: 600;
box-shadow: 0 2px 6px rgba(0,0,0,.05);
}

/* STATS */
.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
margin-bottom:10px;
}

.boxstat{
background:#fff;
padding:10px;
border-radius:12px;
text-align:center;
border:2px solid #6d28d9;
box-shadow:0 0 10px rgba(109,40,217,0.15);
}

/* CARD */
.card{
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:14px;
border:2px solid #e5e7eb;
box-shadow:0 2px 6px rgba(0,0,0,.05);
font-size:13px;
line-height:1.5;
position:relative;
}

.data{
white-space:pre-line;
font-weight:600;
}

/* WA GROUP */
.wa-group{
display:flex;
gap:16px;
margin-top:12px;
margin-bottom:4px;
}

.wa-box{
display:flex;
flex-direction:column;
align-items:center;
text-decoration:none;
width:70px;
}

/* ICON WA MIRIP ASLI ANDROID HP */
.wa-icon{
width:58px; 
height:58px;
border-radius:50%;
background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
display:flex;
align-items:center;
justify-content:center;
box-shadow: 0 4px 10px rgba(18, 140, 126, 0.4);
transition: transform 0.1s ease;
}

.wa2 .wa-icon{
background: linear-gradient(135deg, #128C7E 0%, #075E54 100%);
box-shadow: 0 4px 10px rgba(7, 94, 84, 0.4);
}

.wa-box:active .wa-icon {
transform: scale(0.92);
}

.wa-icon svg{
width:36px;
height:36px;
fill:#fff;
}

.wa-text{
font-size:11px;
margin-top:6px;
font-weight:700;
color:#555;
letter-spacing: 0.5px;
}

/* BUTTON */
.aksi{
margin-top:12px;
}

.btn{
width:100%;
height:44px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.kirim{
background:#1565c0;
color:#fff;
}

.sudah{
background:#16a34a;
color:#fff;
}

/* STYLE MODAL CUSTOM ELEGAN */
.modal-overlay {
position: fixed;
top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0, 0, 0, 0.5);
display: flex; justify-content: center; align-items: center;
z-index: 9999; opacity: 0; pointer-events: none;
transition: opacity 0.2s ease;
}

.modal-overlay.aktif {
opacity: 1; pointer-events: auto;
}

.modal-content {
background: #fff; padding: 24px 20px;
border-radius: 16px; width: 290px; text-align: center;
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
transform: scale(0.8); transition: transform 0.2s ease;
}

.modal-overlay.aktif .modal-content {
transform: scale(1);
}

.modal-title {
font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #111;
}

.modal-text {
font-size: 14px; color: #555; line-height: 1.4; margin-bottom: 20px;
}

.modal-buttons {
display: flex; gap: 10px; justify-content: center;
}

.btn-modal {
padding: 10px 16px; border: none; border-radius: 8px;
font-weight: 700; cursor: pointer; font-size: 13px; width: auto; flex: 1;
}
