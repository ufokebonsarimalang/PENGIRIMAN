<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pengiriman</title>

<style>

body{
  margin:0;
  padding:15px;
  background:#f5f7fa;
  font-family:Arial,sans-serif;
}

.header{
  background:#1565c0;
  color:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

.jumlah{
  text-align:center;
  margin-bottom:20px;
}

.tanggal-besar{
  font-size:24px;
  font-weight:bold;
  color:#1565c0;
}

.total{
  margin-top:10px;
  font-size:18px;
  font-weight:bold;
}

.card{
  background:white;
  border-radius:15px;
  padding:18px;
  margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,.15);
  white-space:pre-wrap;
  line-height:1.7;
  font-size:16px;
}

#loginBox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f5f7fa;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.login-card{
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 3px 10px rgba(0,0,0,.2);
  text-align:center;
}

.login-card input{
  padding:10px;
  width:200px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

.login-card button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  background:#1565c0;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <div class="login-card">
    <h2>Login PIN</h2>
    <input type="password" id="pin" placeholder="Masukkan PIN">
    <br>
    <button onclick="login()">Masuk</button>
    <p id="msg" style="color:red;"></p>
  </div>
</div>

<!-- 📦 CONTENT -->
<div id="content" style="display:none;">

<div class="header">
  <img src="logo.png"
       style="width:120px;height:120px;border-radius:50%;border:4px solid #FFFFFF;object-fit:cover;">
  <h2 style="margin-top:10px;">CEK PENGIRIMAN</h2>
</div>

<div id="jumlah" class="jumlah">
Memuat data...
</div>

<div id="list"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbykT2QFJ_BtyUaXbMAlCwPqdQFiS09U3gVUQXRZR4ufbyf8hpj6oZcQ5jTiLthzFBjt/exec";

let correctPIN = "";
let sheetData = [];

/* 🔥 ambil data + pin */
fetch(API_URL)
.then(r => r.json())
.then(res => {

  correctPIN = res.pin;
  sheetData = res.data;

})
.catch(err => {
  console.log("Error ambil API", err);
});

/* 🔐 LOGIN */
function login(){

  const pin = document.getElementById("pin").value;

  if(pin === correctPIN){

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("content").style.display = "block";

    loadData();

  } else {
    document.getElementById("msg").innerText = "PIN salah!";
  }

}

/* 📦 LOAD DATA */
function loadData(){

  let html = "";
  let total = 0;
  let tanggalPengiriman = "";

  sheetData.forEach(row => {

    const isi = row[0];
    if(!isi) return;

    total++;

    if(!tanggalPengiriman && row[1]){

      const tgl = new Date(row[1]);

      tanggalPengiriman =
        tgl.toLocaleDateString("id-ID",{
          day:"2-digit",
          month:"long",
          year:"numeric"
        });

    }

    html += `
    <div class="card">
${isi}
    </div>
    `;

  });

  document.getElementById("jumlah").innerHTML = `
  <div class="tanggal-besar">
    📅 ${tanggalPengiriman}
  </div>

  <div class="total">
    Total Pengiriman : ${total}
  </div>
`;

  document.getElementById("list").innerHTML = html;

}

</script>

</body>
</html>
